name: Build JARVIS APK

on:
  push:
    branches: [main]
    paths:
      - 'capacitor.config.ts'
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android \
            @capacitor/push-notifications @capacitor/local-notifications \
            @capacitor/haptics @capacitor/camera @capacitor/filesystem \
            @capacitor/network @capacitor/splash-screen --save

      - name: Init Capacitor Android
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "JARVIS APK v${{ github.run_number }}"
          body: |
            ## JARVIS Android APK
            
            Auto-built from commit ${{ github.sha }}
            
            ### Install kaise karo:
            1. APK download karo
            2. Settings → Unknown Sources → Allow
            3. APK install karo
            4. Open → JARVIS load hoga from Vercel
            
            ### Features:
            - Full screen (no browser bar)
            - Native push notifications
            - Camera/Mic native access
            - Background capability
            - Auto-updates (loads live from vercel)
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
